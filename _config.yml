collections:
  databases:
    output: true
    permalink: /d/:name
  articles:
    output: true
    permalink: /a/:name
  conferences:
    output: true
    permalink: /c/:name
  ideas:
    output: true
    permalink: /i/:name
  topics:
    output: true

# See https://github.com/mmistakes/minimal-mistakes/issues/1875
# for configuring minimal-mistakes theme
remote_theme: "mmistakes/minimal-mistakes@4.27.1"
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-last-modified-at

title: MathBases
description: Of, by, and for mathematical databases
url: "https://mathbases.org"
# name-with-owner of the production repo. jekyll-github-metadata (loaded by the
# github-pages gem) needs this to resolve site.github.*; GitHub's legacy builder
# sets it automatically via PAGES_REPO_NWO, but our Actions build must state it.
repository: "MathBases/MathBases"
exclude:
  - "DATA.md"
  - "template.md"
  - "split_data.py"
  # Jekyll's default excludes (a custom `exclude:` replaces the defaults rather
  # than merging, so they must be restated). Without vendor/bundle/ here, the
  # Actions build tries to render files inside the bundler-installed gems and
  # fails.
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

defaults: # setting default variables for pages, e.g., layout
  - scope:
      path: "_databases"
    values:
      layout: "dataset"
      # TODO: replace with "database"
  - scope:
      path: "_conferences"
    values:
      layout: "conference"
  - scope:
      path: "_articles"
    values:
      layout: "article"
  - scope:
      path: "_ideas"
    values:
      layout: "idea"

github:
  - is_project_page: false
show_downloads:
  false
